name: Build packages

on:
  workflow_dispatch:
  release:
    types: [published, edited]

permissions:
  contents: write

env:
  VERSION: "1.0.0"

jobs:
  ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build .deb + AppImage
        run: |
          docker build \
            -f packaging/linux/ubuntu.dockerfile \
            --build-arg VERSION=${{ env.VERSION }} \
            --target both \
            --output type=local,dest=./out \
            .

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ubuntu-packages
          path: out/

  windows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build NSIS installer
        run: |
          docker build \
            -f packaging/windows/cross-compile.dockerfile \
            --build-arg VERSION=${{ env.VERSION }} \
            --target installer \
            --output type=local,dest=. \
            .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-package
          path: amber-setup.exe

  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: brew install qt@6 ffmpeg cmake

      - name: Build
        run: |
          export CMAKE_PREFIX_PATH="$(brew --prefix qt@6);$(brew --prefix ffmpeg)"
          cmake -S src -B build -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_PREFIX_PATH="$CMAKE_PREFIX_PATH"
          cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Create .app bundle
        run: |
          cd build
          mkdir -p Amber.app/Contents/MacOS
          mkdir -p Amber.app/Contents/Resources
          cp Amber Amber.app/Contents/MacOS/Amber
          cat > Amber.app/Contents/Info.plist <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key>
            <string>Amber</string>
            <key>CFBundleName</key>
            <string>Amber</string>
            <key>CFBundleIdentifier</key>
            <string>org.ambervideoeditor.Amber</string>
            <key>CFBundleVersion</key>
            <string>${VERSION}</string>
            <key>CFBundleShortVersionString</key>
            <string>${VERSION}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
          </dict>
          </plist>
          PLIST
          $(brew --prefix qt@6)/bin/macdeployqt Amber.app

      - name: Create .dmg
        run: |
          cd build
          hdiutil create -volname "Amber" -srcfolder Amber.app -ov -format UDZO \
            "Amber-${{ env.VERSION }}-arm64.dmg"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-package
          path: build/Amber-*.dmg

  release:
    needs: [ubuntu, windows, macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: List artifacts
        run: ls -lhR

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.release.tag_name }}
          prerelease: ${{ github.event.release.prerelease }}
          files: |
            amber-editor_*.deb
            Amber-*.AppImage
            amber-setup.exe
            Amber-*.dmg
